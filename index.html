<!doctype html>
<html lang="id" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ninja Perkalian - By Mathnology</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Nunito', sans-serif; touch-action: manipulation; }

    @keyframes popIn {
      0% { transform: scale(0.5); opacity: 0; }
      70% { transform: scale(1.1); }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
    @keyframes bounceIn {
      0% { transform: scale(0.8); opacity: 0; }
      60% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }
    @keyframes pulse-slow {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.98); }
    }
    
    .pop-in { animation: popIn 0.4s ease-out forwards; }
    .shake { animation: shake 0.4s ease-in-out; }
    .bounce-in { animation: bounceIn 0.3s ease-out forwards; }
    .float { animation: float 3s ease-in-out infinite; }
    .pulse-slow { animation: pulse-slow 2s infinite ease-in-out; }

    .match-card {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      user-select: none;
      position: relative;
      z-index: 60; 
      -webkit-tap-highlight-color: transparent;
    }
    .match-card:active:not(.matched):not(.disabled) {
      transform: scale(0.95);
    }
    .match-card:hover:not(.matched):not(.selected):not(.disabled) {
      transform: translateY(-2px) scale(1.02);
    }
    .match-card.selected {
      transform: scale(1.05);
    }
    .match-card.matched {
      cursor: default;
      opacity: 0.85; 
    }
    .match-card.disabled {
        cursor: not-allowed;
        opacity: 0.6;
        pointer-events: none;
    }

    .confetti-piece {
      position: fixed;
      top: -30px; 
      pointer-events: none;
      z-index: 9999; 
      opacity: 0;
    }
    @keyframes confetti-fall {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
      50% { opacity: 1; }
      100% { transform: translateY(110vh) rotate(720deg) scale(0.8); opacity: 0; }
    }
    
    .line-connector {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 50; 
      overflow: visible; 
    }
    
    path.drawn-line {
      transition: d 0.2s ease-out;
    }

    .char-sprite {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: inline-block;
      will-change: transform;
    }
    
    #battle-effect {
      pointer-events: none;
      z-index: 20;
    }
    
    .ninja-hurt {
        filter: drop-shadow(0 0 15px rgba(244, 63, 94, 0.8)) brightness(1.3) saturate(3);
    }
    .enemy-hurt {
        filter: drop-shadow(0 0 15px rgba(16, 185, 129, 0.8)) brightness(1.3) saturate(3);
    }

    .menu-btn {
        transition: all 0.2s ease;
        -webkit-tap-highlight-color: transparent;
    }
    .menu-btn:active {
        transform: scale(0.95);
    }
  </style>
  <style>body { box-sizing: border-box; overscroll-behavior-y: none; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full text-slate-200">
  <div id="app-wrapper" class="h-full w-full overflow-x-hidden overflow-y-auto relative" style="background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);">
   
   <audio id="bg-music" loop preload="auto">
       <source src="https://raw.githubusercontent.com/dosen-uinsi/Perkalian-Ninja-6-7-8-/main/Pertarungan%20Ninja.mp3" type="audio/mpeg">
   </audio>
   <audio id="sfx-start" preload="auto">
       <source src="https://raw.githubusercontent.com/dosen-uinsi/Perkalian-Ninja-6-7-8-/main/266566__gowlermusic__gong-hit.wav" type="audio/wav">
   </audio>
   <audio id="sfx-ninja" preload="auto">
       <source src="https://raw.githubusercontent.com/dosen-uinsi/Perkalian-Ninja-6-7-8-/main/441666__ethanchase7744__sword-slash.wav" type="audio/wav">
   </audio>
   <audio id="sfx-enemy" preload="auto">

   </audio>
   <audio id="sfx-win" preload="auto">
       <source src="https://raw.githubusercontent.com/dosen-uinsi/Perkalian-Ninja-6-7-8-/main/840820__silverillusionist__victory-fanfare-8-bit-flag-1.wav" type="audio/wav">
   </audio>
   <audio id="sfx-lose" preload="auto">

   </audio>

   <div style="position:fixed;top:-20px;right:-20px;width:150px;height:150px;border-radius:50%;background:rgba(249, 115, 22, 0.05);pointer-events:none;z-index:0;"></div>
   <div style="position:fixed;bottom:-30px;left:-30px;width:180px;height:180px;border-radius:50%;background:rgba(56, 189, 248, 0.05);pointer-events:none;z-index:0;"></div>

   <div id="splash-view" class="max-w-3xl mx-auto px-4 py-12 relative z-10 flex flex-col items-center justify-center min-h-full cursor-pointer" onclick="enterMainMenu()">
       <div class="text-center"> 
           <div class="text-8xl md:text-[9rem] mb-6">🥷✨</div>
           <h1 class="text-6xl md:text-7xl font-black tracking-tight mb-2" style="color: #f8fafc; line-height: 1.1;">Ninja<br><span style="color: #f97316;">Perkalian</span></h1>
           <h2 class="text-sm md:text-base font-extrabold uppercase mb-16" style="color: #38bdf8; letter-spacing: 0.3em;">By Mathnology</h2>
           
           <div class="pulse-slow inline-block px-8 py-3 rounded-full border-2" style="background: rgba(249, 115, 22, 0.15); border-color: rgba(249, 115, 22, 0.5); color: #f97316;">
               <span class="font-bold text-lg md:text-xl tracking-wide">Ketuk Layar Untuk Mulai</span>
           </div>
       </div>
   </div>

   <div id="home-view" class="max-w-3xl mx-auto px-4 py-8 relative z-10 flex flex-col items-center justify-center min-h-full hidden">
       <div class="text-center mb-8 float">
           <div class="text-6xl md:text-7xl mb-3 drop-shadow-md">🥷✨</div>
           <h1 class="text-5xl md:text-6xl font-black tracking-tight mb-2" style="color: #f8fafc; line-height: 1.1;">Ninja<br><span style="color: #f97316;">Perkalian</span></h1>
           <h2 class="text-xs md:text-sm font-extrabold uppercase mb-4" style="color: #38bdf8; letter-spacing: 0.25em;">By Mathnology</h2>
           <p class="text-base md:text-lg font-semibold px-2 mt-3" style="color: #94a3b8;">Siapa yang akan kamu lawan hari ini?</p>
       </div>

       <div class="w-full max-w-sm md:max-w-md flex flex-col gap-4 md:gap-5">
           <button onclick="startGame('6')" class="menu-btn relative overflow-hidden rounded-3xl p-5 md:p-6 text-left flex items-center justify-between group" style="background: linear-gradient(135deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.9)); border: 2px solid rgba(56, 189, 248, 0.4);">
               <div class="flex flex-col">
                   <span class="text-xl md:text-2xl font-black mb-1" style="color: #38bdf8;">Perkalian 6</span>
                   <span class="text-xs md:text-sm font-semibold" style="color: #94a3b8;">Lawan: Naga 🐉</span>
               </div>
               <div class="text-4xl md:text-5xl transform transition-transform group-hover:scale-110">🐉</div>
           </button>

           <button onclick="startGame('78')" class="menu-btn relative overflow-hidden rounded-3xl p-5 md:p-6 text-left flex items-center justify-between group" style="background: linear-gradient(135deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.9)); border: 2px solid rgba(244, 63, 94, 0.4);">
               <div class="flex flex-col">
                   <span class="text-xl md:text-2xl font-black mb-1" style="color: #f43f5e;">Perkalian 7 & 8</span>
                   <span class="text-xs md:text-sm font-semibold" style="color: #94a3b8;">Lawan: Raksasa 👹</span>
               </div>
               <div class="text-4xl md:text-5xl transform transition-transform group-hover:scale-110">👹</div>
           </button>
       </div>
   </div>

   <div id="game-view" class="max-w-3xl mx-auto px-3 py-6 md:py-8 relative z-10 hidden">
    <header class="text-center mb-5 md:mb-6">
     <h1 class="text-2xl md:text-4xl font-black tracking-tight mb-1" style="color: #f8fafc;">Ninja <span style="color: #f97316;">Perkalian</span></h1>
     <h2 class="text-[10px] md:text-sm font-extrabold uppercase mb-2" style="color: #38bdf8; letter-spacing: 0.25em;">By Mathnology</h2>
     <p id="game-instruction-text" class="text-sm md:text-base font-semibold leading-tight" style="color: #94a3b8;">Jawab benar 3 kali untuk menang!</p>
    </header>

    <div class="relative border-2 rounded-2xl md:rounded-3xl p-4 md:p-6 mb-5 shadow-2xl" style="background-color: rgba(15, 23, 42, 0.6); border-color: rgba(51, 65, 85, 0.8);">
        <div class="flex justify-between items-center mb-3 pb-3 border-b border-slate-700/60">
            <div class="flex flex-col items-start gap-0.5">
                <span class="font-bold text-[10px] md:text-xs uppercase tracking-wider text-slate-400">Ninja HP</span>
                <div id="ninja-hp-hearts" class="text-lg md:text-2xl flex gap-1" style="color: #f43f5e;">❤️</div>
            </div>
            <div class="font-black text-sm md:text-xl text-slate-500">VS</div>
            <div class="flex flex-col items-end gap-0.5">
                <span id="enemy-hp-label" class="font-bold text-[10px] md:text-xs uppercase tracking-wider text-slate-400">Musuh HP</span>
                <div id="enemy-hp-hearts" class="text-lg md:text-2xl flex gap-1" style="color: #10b981;">💚💚💚</div>
            </div>
        </div>

        <div class="flex justify-between items-center relative py-5 px-2 md:px-4 overflow-hidden rounded-xl md:rounded-2xl" style="background-color: rgba(0, 0, 0, 0.2);">
            <div id="ninja-char" class="char-sprite text-5xl md:text-7xl z-10 drop-shadow-xl" style="transform: scaleX(-1);">🥷</div>
            <div id="battle-effect" class="absolute left-1/2 top-1/2 transform -translate-x-1/2 -translate-y-1/2 text-5xl md:text-7xl opacity-0 z-20">💥</div>
            <div id="enemy-char" class="char-sprite text-5xl md:text-7xl z-10 drop-shadow-xl">🐉</div>
        </div>
    </div>
    
    <div class="flex items-center justify-between mb-5 gap-2 md:gap-3">
     <button onclick="goHome()" class="flex items-center justify-center p-2.5 md:p-3 rounded-xl md:rounded-2xl transition-all shadow-sm active:scale-95" style="background: rgba(248, 113, 113, 0.1); border: 1px solid rgba(248, 113, 113, 0.3); color: #f87171;" title="Kembali ke Menu">
         <i data-lucide="home" class="w-5 h-5 md:w-6 md:h-6"></i>
     </button>
     
     <div id="status-msg" class="font-bold text-xs md:text-base px-2 py-3 rounded-xl md:rounded-2xl text-center flex-1 shadow-sm truncate" style="color: #cbd5e1; background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(51, 65, 85, 0.8);">
      Pilih soal di kiri
     </div>
     
     <button id="reset-btn" onclick="resetGame()" class="flex items-center gap-1 md:gap-2 px-3 py-2.5 md:py-3 rounded-xl md:rounded-2xl font-bold text-xs md:text-base transition-all shadow-sm active:scale-95" style="background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.3); color: #38bdf8;"> 
      <i data-lucide="refresh-cw" class="w-4 h-4 md:w-5 md:h-5"></i> <span class="hidden sm:inline">Ulang</span>
     </button>
    </div>
    
    <div id="game-board" class="relative pb-6 w-full">
     <svg id="svg-lines" class="line-connector"></svg>
     <div class="grid grid-cols-[auto_1fr_auto] gap-x-2 md:gap-x-6 gap-y-4 md:gap-y-6 items-center w-full" id="match-grid">

   </div>

   <div id="end-screen" class="hidden fixed inset-0 z-[100] flex items-end justify-center px-4 pb-10 md:pb-16 transition-opacity" style="background-color: rgba(15, 23, 42, 0.6);">
       <div id="end-card" class="text-center py-6 px-6 rounded-[2rem] bounce-in relative overflow-hidden shadow-2xl w-full max-w-[320px] border-2">
         <div id="end-icon" class="text-6xl md:text-7xl mb-3 relative z-10">🏆</div>
         <h2 id="end-title" class="text-2xl md:text-3xl font-black mb-1 relative z-10 leading-tight">Musuh Dikalahkan!</h2>
         <p id="end-subtitle" class="font-semibold text-sm md:text-base relative z-10 mb-6" style="color: #cbd5e1;">Kamu master perkalian!</p>
         
         <div class="flex items-center justify-center gap-3 md:gap-4 relative z-10">
             <button onclick="goHome()" class="flex-1 flex justify-center items-center gap-2 px-4 py-3.5 rounded-2xl font-bold transition-transform active:scale-95 shadow-md" style="background: rgba(248, 113, 113, 0.15); border: 1px solid rgba(248, 113, 113, 0.4); color: #f87171;">
                 <i data-lucide="home" class="w-5 h-5"></i> Menu
             </button>
             <button onclick="resetGame()" class="flex-1 flex justify-center items-center gap-2 px-4 py-3.5 rounded-2xl font-bold transition-transform active:scale-95 shadow-md" style="background: rgba(56, 189, 248, 0.15); border: 1px solid rgba(56, 189, 248, 0.4); color: #38bdf8;">
                 <i data-lucide="refresh-cw" class="w-5 h-5"></i> Ulang
             </button>
         </div>
       </div>
   </div>
  </div>
  
  <script>
    if (window.lucide) lucide.createIcons();

    // ===== AUDIO & SFX CONTROLS =====
    const bgMusic = document.getElementById('bg-music');
    const sfxStart = document.getElementById('sfx-start');
    const sfxNinja = document.getElementById('sfx-ninja');
    const sfxEnemy = document.getElementById('sfx-enemy');
    const sfxWin = document.getElementById('sfx-win');
    const sfxLose = document.getElementById('sfx-lose');
    
    bgMusic.volume = 0.5; 
    let isAudioUnlocked = false;

    // Buka kunci semua elemen audio
    function unlockAudio() {
        if(isAudioUnlocked) return; 

        [sfxStart, sfxNinja, sfxEnemy, sfxWin, sfxLose].forEach(audio => {
            let playPromise = audio.play();
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    audio.pause();
                    audio.currentTime = 0;
                }).catch(e => console.log("Audio diblokir:", e));
            }
        });
        
        bgMusic.play().catch(e => console.log("BGM diblokir:", e));
        isAudioUnlocked = true;
    }

    // Transisi dari Splash Screen ke Menu Utama
    function enterMainMenu() {
        unlockAudio(); 
        document.getElementById('splash-view').classList.add('hidden');
        document.getElementById('home-view').classList.remove('hidden');
    }

    function playSFX(audioElement) {
        if (audioElement) {
            audioElement.currentTime = 0;
            let playPromise = audioElement.play();
            if(playPromise !== undefined) {
                playPromise.catch(e => console.log("SFX blokir:", e));
            }
        }
    }

    function stopEndSounds() {
        sfxWin.pause(); sfxWin.currentTime = 0;
        sfxLose.pause(); sfxLose.currentTime = 0;
    }

    // ===== FUNGSI GETAR (HAPTIC FEEDBACK) =====
    function triggerVibration(pattern) {
        if ("vibrate" in navigator) {
            try { navigator.vibrate(pattern); } catch(e) { console.log("Getar gagal:", e); }
        }
    }

    // ===== GAME DATA CONFIG =====
    const MODES = {
        '6': {
            enemyName: 'Naga',
            enemyIcon: '🐉',
            instruction_text: 'Tarik garis untuk menyerang Naga 🐉',
            problems: [
                { q: '6 × 6', a: 36, id: 0 },
                { q: '6 × 7', a: 42, id: 1 },
                { q: '6 × 8', a: 48, id: 2 }
            ]
        },
        '78': {
            enemyName: 'Raksasa',
            enemyIcon: '👹', 
            instruction_text: 'Tarik garis untuk menyerang Raksasa 👹',
            problems: [
                { q: '7 × 7', a: 49, id: 0 },
                { q: '7 × 8', a: 56, id: 1 },
                { q: '8 × 8', a: 64, id: 2 }
            ]
        }
    };

    const MAX_NINJA_HP = 1;
    const MAX_ENEMY_HP = 3;

    let currentMode = '6';
    let currentProblems = [];
    let shuffledAnswers = [];
    let selectedQ = null;
    let selectedA = null;
    let matches = {}; 
    let isLocked = false; 
    let isGameOver = false;

    let ninjaHP = MAX_NINJA_HP;
    let enemyHP = MAX_ENEMY_HP;

    // --- NAVIGATION ---
    function startGame(mode) {
        bgMusic.pause(); 
        playSFX(sfxStart); 
        
        currentMode = mode;
        const conf = MODES[currentMode];
        currentProblems = conf.problems;
        
        document.getElementById('enemy-hp-label').textContent = conf.enemyName + ' HP';
        document.getElementById('game-instruction-text').textContent = conf.instruction_text;
        
        document.getElementById('home-view').classList.add('hidden');
        document.getElementById('game-view').classList.remove('hidden');
        
        resetGame();
    }

    function goHome() {
        stopEndSounds(); 
        document.getElementById('end-screen').classList.add('hidden');
        bgMusic.play().catch(e => console.log(e)); 
        
        document.getElementById('game-view').classList.add('hidden');
        document.getElementById('home-view').classList.remove('hidden');
        document.getElementById('svg-lines').innerHTML = '';
    }

    // --- UTILS ---
    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function buildBoard() {
      shuffledAnswers = shuffle(currentProblems.map(p => ({ val: p.a, id: p.id })));
      const grid = document.getElementById('match-grid');
      grid.innerHTML = '';

      currentProblems.forEach((p, i) => {
        const qDiv = document.createElement('div');
        qDiv.className = 'w-full flex justify-start';
        qDiv.innerHTML = `
          <div class="match-card q-card pop-in flex items-center justify-center w-full min-w-[100px] max-w-[120px] md:max-w-[170px] py-4 md:py-5 px-2 md:px-3 rounded-xl md:rounded-2xl text-center font-black text-lg md:text-2xl cursor-pointer select-none shadow-md"
               data-qid="${p.id}"
               style="animation-delay:${i * 0.1}s; background-color: #1e293b; border: 2px solid rgba(249, 115, 22, 0.4); color: #f97316;"
               onclick="selectQuestion(${p.id})">
            ${p.q}
          </div>`;
        grid.appendChild(qDiv);

        const mid = document.createElement('div');
        mid.className = 'w-full h-full';
        grid.appendChild(mid);

        const ans = shuffledAnswers[i];
        const aDiv = document.createElement('div');
        aDiv.className = 'w-full flex justify-end';
        aDiv.innerHTML = `
          <div class="match-card a-card pop-in flex items-center justify-center w-full min-w-[100px] max-w-[120px] md:max-w-[170px] py-4 md:py-5 px-2 md:px-3 rounded-xl md:rounded-2xl text-center font-black text-lg md:text-2xl cursor-pointer select-none shadow-md"
               data-aid="${ans.id}"
               style="animation-delay:${i * 0.1 + 0.15}s; background-color: #1e293b; border: 2px solid rgba(56, 189, 248, 0.4); color: #38bdf8;"
               onclick="selectAnswer(${ans.id})">
            ${ans.val}
          </div>`;
        grid.appendChild(aDiv);
      });
    }

    // --- HP UPDATE ---
    function updateHPDisplays() {
        const ninjaHPContainer = document.getElementById('ninja-hp-hearts');
        ninjaHPContainer.innerHTML = Array(ninjaHP).fill('❤️').join('');
        if (ninjaHP === 0) ninjaHPContainer.innerHTML = '☠️';

        const enemyHPContainer = document.getElementById('enemy-hp-hearts');
        enemyHPContainer.innerHTML = Array(enemyHP).fill('💚').join('');
    }

    // --- BATTLE ANIMATION ---
    function triggerNinjaAttack() {
      playSFX(sfxNinja); 
      
      const ninja = document.getElementById('ninja-char');
      const enemy = document.getElementById('enemy-char');
      const effect = document.getElementById('battle-effect');
      
      const dashDistance = window.innerWidth < 600 ? '-50px' : '-90px';
      ninja.style.transform = `scaleX(-1) translateX(${dashDistance}) scale(1.3)`;
      
      setTimeout(() => {
        effect.textContent = '💥'; effect.style.opacity = '1'; effect.style.transform = 'translate(-50%, -50%) scale(1.3)';
        enemy.classList.add('shake', 'enemy-hurt');
        triggerVibration(80);

        enemyHP--; updateHPDisplays();
        
        setTimeout(() => {
          ninja.style.transform = 'scaleX(-1) translateX(0) scale(1)'; effect.style.opacity = '0'; effect.style.transform = 'translate(-50%, -50%) scale(1)';
          enemy.classList.remove('shake', 'enemy-hurt');
          enemy.style.transform = ''; 
          
          if (enemyHP <= 0) {
              enemy.textContent = '💀'; 
              enemy.style.transform = 'scaleX(1) scale(0.8)'; 
              enemy.style.filter = 'grayscale(1)';
              triggerGameEnd('win');
          }
        }, 400);
      }, 200);
    }

    function triggerEnemyAttack() {
      playSFX(sfxEnemy);
      
      const ninja = document.getElementById('ninja-char');
      const enemy = document.getElementById('enemy-char');
      const effect = document.getElementById('battle-effect');

      const dashDistance = window.innerWidth < 600 ? '-50px' : '-90px';
      enemy.style.transform = `translateX(${dashDistance}) scale(1.3)`;
      
      setTimeout(() => {
        effect.textContent = '🔥'; effect.style.opacity = '1'; effect.style.transform = 'translate(-50%, -50%) scale(1.5)'; effect.style.filter = 'drop-shadow(0 0 10px rgba(249, 115, 22, 0.8))';
        ninja.classList.add('shake', 'ninja-hurt');
        triggerVibration([150, 50, 200]);
        
        ninjaHP = 0; updateHPDisplays();

        setTimeout(() => {
          enemy.style.transform = 'translateX(0) scale(1)'; effect.style.opacity = '0'; effect.style.transform = 'translate(-50%, -50%) scale(1)'; effect.style.filter = '';
          ninja.classList.remove('shake', 'ninja-hurt');
          
          ninja.textContent = '🪦'; ninja.style.transform = 'scaleX(-1) translateY(10px) scale(0.8)'; ninja.style.filter = 'grayscale(1)';
          triggerGameEnd('lose');

        }, 400);
      }, 200);
    }

    // --- GAME END LOGIC ---
    function disableAllCards() {
        document.querySelectorAll('.match-card:not(.matched)').forEach(el => el.classList.add('disabled'));
    }

    function triggerGameEnd(condition) {
        isGameOver = true;
        disableAllCards();
        const conf = MODES[currentMode];
        const endScreen = document.getElementById('end-screen');
        const endCard = document.getElementById('end-card');
        const endIcon = document.getElementById('end-icon');
        const endTitle = document.getElementById('end-title');
        const endSubtitle = document.getElementById('end-subtitle');

        if (condition === 'win') {
            playSFX(sfxWin); 
            endCard.style.background = 'linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(15, 23, 42, 0.98))'; 
            endCard.style.borderColor = 'rgba(16, 185, 129, 0.4)';
            endIcon.textContent = '🏆'; 
            endTitle.textContent = `${conf.enemyName} Tumbang!`; 
            endTitle.style.color = '#10b981';
            endSubtitle.textContent = 'Kamu adalah master perkalian!';
            
            let confettiCount = window.innerWidth < 600 ? 30 : 50;
            spawnConfetti(confettiCount); 
            
            setStatus('🏆 Menang!');
            triggerVibration([100, 50, 100, 50, 150]); 
        } else {
            playSFX(sfxLose); 
            endCard.style.background = 'linear-gradient(135deg, rgba(244, 63, 94, 0.2), rgba(15, 23, 42, 0.98))'; 
            endCard.style.borderColor = 'rgba(244, 63, 94, 0.4)';
            endIcon.textContent = '☠️'; 
            endTitle.textContent = 'Ninja Gugur!'; 
            endTitle.style.color = '#f43f5e';
            endSubtitle.textContent = 'Awas, perhatikan jawabanmu.';
            setStatus('❌ Game Over!');
        }
        endScreen.classList.remove('hidden');
    }

    // --- LOGIC PERTANDINGAN ---
    function selectQuestion(qid) {
      if (isLocked || isGameOver || matches[qid]) return; clearSelections(); selectedQ = qid;
      const el = document.querySelector(`[data-qid="${qid}"]`); el.classList.add('selected', 'glow-pulse'); el.style.boxShadow = '0 0 10px rgba(249, 115, 22, 0.5)'; setStatus('Sekarang pilih jawaban di kanan');
      triggerVibration(15); 
      checkMatch();
    }

    function selectAnswer(aid) {
      if (isLocked || isGameOver) return;
      for (const k in matches) { if (matches[k].a_id === aid) return; }
      document.querySelectorAll('.a-card.selected').forEach(el => { el.classList.remove('selected', 'glow-pulse'); el.style.boxShadow = ''; });
      selectedA = aid;
      const el = document.querySelector(`[data-aid="${aid}"]`); el.classList.add('selected', 'glow-pulse'); el.style.boxShadow = '0 0 10px rgba(56, 189, 248, 0.5)';
      if (selectedQ === null) setStatus('Pilih soal di kiri dulu');
      triggerVibration(15);
      checkMatch();
    }

    function clearSelections() {
      document.querySelectorAll('.match-card.selected').forEach(el => { el.classList.remove('selected', 'glow-pulse'); el.style.boxShadow = ''; });
      selectedQ = null; selectedA = null;
    }

    function checkMatch() {
      if (selectedQ === null || selectedA === null) return;
      const problem = currentProblems.find(p => p.id === selectedQ);
      const isCorrect = problem.id === selectedA;
      const qEl = document.querySelector(`[data-qid="${selectedQ}"]`);
      const aEl = document.querySelector(`[data-aid="${selectedA}"]`);

      isLocked = true;

      if (isCorrect) {
        matches[selectedQ] = { a_id: selectedA, correct: true };
        qEl.classList.remove('selected', 'glow-pulse'); aEl.classList.remove('selected', 'glow-pulse');
        [qEl, aEl].forEach(el => { el.classList.add('matched'); el.style.backgroundColor = '#1e293b'; el.style.borderColor = '#10b981'; el.style.color = '#10b981'; el.style.boxShadow = '0 0 8px rgba(16, 185, 129, 0.3)'; });
        void qEl.offsetWidth; void aEl.offsetWidth;
        drawLine(qEl, aEl, '#10b981', selectedQ);
        triggerNinjaAttack();
        setStatus('⚔️ Serangan Berhasil!');
        selectedQ = null; selectedA = null;
        setTimeout(() => { if (!isGameOver) isLocked = false; }, 800);
      } else {
        triggerEnemyAttack();
        qEl.classList.add('shake'); aEl.classList.add('shake'); qEl.style.borderColor = '#f43f5e'; aEl.style.borderColor = '#ff4d4d';
        setStatus('🔥 Semburan Musuh!');
        disableAllCards(); 
      }
    }

    // --- GARIS PENGHUBUNG & RESIZE ---
    function drawLine(fromEl, toEl, color, idStr) {
      const svg = document.getElementById('svg-lines'); const board = document.getElementById('game-board'); 
      svg.setAttribute('width', board.offsetWidth); svg.setAttribute('height', board.offsetHeight); 
      const bRect = board.getBoundingClientRect(); const fRect = fromEl.getBoundingClientRect(); const tRect = toEl.getBoundingClientRect(); 
      
      const startX = (fRect.right - bRect.left) - 5; const startY = fRect.top + (fRect.height / 2) - bRect.top; 
      const endX = (tRect.left - bRect.left) + 5; const endY = tRect.top + (tRect.height / 2) - bRect.top; 
      
      const controlPointOffset = window.innerWidth < 600 ? 30 : 60; 
      const pathData = `M ${startX} ${startY} C ${startX + controlPointOffset} ${startY}, ${endX - controlPointOffset} ${endY}, ${endX} ${endY}`; 
      
      let path = document.querySelector(`path[data-line-id="${idStr}"]`);
      if (!path) { path = document.createElementNS('http://www.w3.org/2000/svg', 'path'); path.setAttribute('data-line-id', idStr); path.setAttribute('stroke', color); path.setAttribute('stroke-width', '4'); path.setAttribute('fill', 'none'); path.setAttribute('stroke-linecap', 'round'); path.setAttribute('stroke-dasharray', '6,6'); path.classList.add('drawn-line'); path.style.opacity = '0.8'; svg.appendChild(path); }
      path.setAttribute('d', pathData);
    }
    
    window.addEventListener('resize', () => { 
        if(document.getElementById('game-view').classList.contains('hidden')) return; 
        for (const qid in matches) { 
            const qEl = document.querySelector(`[data-qid="${qid}"]`); 
            const aEl = document.querySelector(`[data-aid="${matches[qid].a_id}"]`); 
            if(qEl && aEl) drawLine(qEl, aEl, '#10b981', qid); 
        } 
    });

    // --- LAINNYA ---
    function setStatus(msg) { document.getElementById('status-msg').textContent = msg; }

    function spawnConfetti(count) { 
        const colors = ['#f97316', '#38bdf8', '#10b981', '#f43f5e', '#a78bfa', '#fbbf24']; 
        for (let i = 0; i < count; i++) { 
            const piece = document.createElement('div'); 
            piece.className = 'confetti-piece'; 
            piece.style.left = Math.random() * 100 + 'vw'; 
            
            const isRibbon = Math.random() > 0.4;
            piece.style.width = isRibbon ? '8px' : '12px';
            piece.style.height = isRibbon ? '26px' : '12px';
            piece.style.borderRadius = isRibbon ? '4px' : '2px';
            
            piece.style.background = colors[Math.floor(Math.random() * colors.length)]; 
            
            const duration = Math.random() * 2 + 2; 
            const delay = Math.random() * 0.5;
            piece.style.animation = `confetti-fall ${duration}s ease-in ${delay}s forwards`;
            
            document.body.appendChild(piece); 
            setTimeout(() => piece.remove(), (duration + delay) * 1000); 
        } 
    }

    function resetGame() {
      stopEndSounds(); 
      playSFX(sfxStart);
      
      const conf = MODES[currentMode];
      matches = {}; selectedQ = null; selectedA = null; isLocked = false; isGameOver = false;
      ninjaHP = MAX_NINJA_HP; enemyHP = MAX_ENEMY_HP;
      
      document.getElementById('end-screen').classList.add('hidden');
      document.getElementById('svg-lines').innerHTML = '';
      setStatus('Pilih soal di kiri');
      updateHPDisplays();
      
      const ninja = document.getElementById('ninja-char'); ninja.textContent = '🥷'; ninja.style.transform = 'scaleX(-1)'; ninja.style.filter = ''; ninja.classList.remove('ninja-hurt');
      
      const enemy = document.getElementById('enemy-char'); 
      enemy.textContent = conf.enemyIcon; 
      enemy.style.transform = ''; 
      enemy.style.filter = ''; 
      
      buildBoard();
    }
  </script>
 </body>
